name: cookflow
description: "CookFlow - Ứng dụng quản lý và thực hiện công thức nấu ăn theo Workflow."
publish_to: 'none'
version: 1.0.0+5

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Notifications
  flutter_local_notifications: ^22.0.1

  # Utils
  path_provider: ^2.1.6
  uuid: ^4.5.3
  path: ^1.9.1

  # State management
  provider: ^6.1.5+1

  # UI
  google_fonts: ^6.2.1

  # Image picker
  image_picker: ^1.1.2
  flutter_colorpicker: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
